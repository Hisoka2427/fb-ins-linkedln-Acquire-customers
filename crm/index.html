<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KROG B2B CRM</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --line: #d9e0e8;
      --green: #0f8f61;
      --blue: #2463eb;
      --amber: #b7791f;
      --red: #c2410c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 { font-size: 20px; margin: 0; }
    button, select, input[type="file"]::file-selector-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary { background: var(--blue); color: white; border-color: var(--blue); }
    button.green { background: var(--green); color: white; border-color: var(--green); }
    main { padding: 18px 22px 28px; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(4, minmax(150px, 190px));
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .stat span { display: block; color: var(--muted); font-size: 12px; }
    .stat strong { display: block; font-size: 22px; margin-top: 6px; }
    .table-wrap {
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      max-height: calc(100vh - 230px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1500px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      vertical-align: top;
      font-size: 13px;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      background: #eef2f7;
      z-index: 1;
      white-space: nowrap;
    }
    td.message {
      min-width: 340px;
      white-space: pre-wrap;
      line-height: 1.35;
    }
    textarea {
      width: 220px;
      min-height: 64px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      min-width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: white;
      font-weight: 700;
    }
    .A { background: var(--green); }
    .B { background: var(--blue); }
    .C { background: var(--amber); }
    .D { background: var(--red); }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      main { padding: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>KROG B2B CRM</h1>
      <div class="muted">只生成名单、话术和 wa.me 链接，不发送消息</div>
    </div>
    <div>
      <button class="primary" id="exportToday">导出今日名单</button>
      <button id="exportAll">导出当前数据</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input type="file" id="csvFile" accept=".csv">
      <select id="sourceFilter"><option value="">全部来源</option></select>
      <select id="levelFilter">
        <option value="">全部等级</option>
        <option>A</option><option>B</option><option>C</option><option>D</option>
      </select>
      <select id="statusFilter"><option value="">全部状态</option></select>
      <button class="green" id="showAB">只看 A/B</button>
    </div>

    <section class="stats">
      <div class="stat"><span>全部线索</span><strong id="totalCount">0</strong></div>
      <div class="stat"><span>A 级</span><strong id="aCount">0</strong></div>
      <div class="stat"><span>B 级</span><strong id="bCount">0</strong></div>
      <div class="stat"><span>今日优先</span><strong id="todayCount">0</strong></div>
      <div class="stat"><span>有 WhatsApp</span><strong id="waCount">0</strong></div>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>等级</th>
            <th>评分</th>
            <th>客户 / 店铺</th>
            <th>来源</th>
            <th>平台</th>
            <th>WhatsApp</th>
            <th>推荐类目</th>
            <th>为什么值得联系</th>
            <th>首触达话术</th>
            <th>wa.me</th>
            <th>状态</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <script>
    const fields = ["lead_id","created_at","updated_at","source_platform","source_detail","source_url","lead_name","store_name","profile_url","store_url","facebook_url","instagram_url","linkedin_url","shopee_url","mercado_livre_url","whatsapp_raw","whatsapp_clean","email","city","state","country","customer_type","sales_platform","product_category_detected","recommended_krog_category","business_signal","source_reason","pain_point","krog_angle","lead_score","lead_level","contact_priority","whatsapp_message_1","whatsapp_followup_d1","whatsapp_followup_d3","whatsapp_followup_d7","whatsapp_link","email_message_1","linkedin_note_draft","status","next_action","next_followup_date","notes","risk_flag","duplicate_flag","last_contact_date","reply_summary"];
    const labels = {
      lead_id:"线索编号", created_at:"创建日期", updated_at:"更新日期", source_platform:"来源平台", source_detail:"来源详情", source_url:"来源链接",
      lead_name:"联系人姓名", store_name:"店铺名称", profile_url:"主页链接", store_url:"店铺网站", facebook_url:"Facebook链接", instagram_url:"Instagram链接",
      linkedin_url:"LinkedIn链接", shopee_url:"Shopee链接", mercado_livre_url:"Mercado Livre链接", whatsapp_raw:"WhatsApp原始号码", whatsapp_clean:"WhatsApp清洗号码",
      email:"邮箱", city:"城市", state:"州", country:"国家", customer_type:"客户类型", sales_platform:"销售平台", product_category_detected:"识别到的产品类目",
      recommended_krog_category:"推荐KROG类目", business_signal:"客户价值信号", source_reason:"发现原因", pain_point:"可能痛点", krog_angle:"KROG切入角度",
      lead_score:"客户评分", lead_level:"客户等级", contact_priority:"联系优先级", whatsapp_message_1:"WhatsApp首触达话术", whatsapp_followup_d1:"D+1跟进话术",
      whatsapp_followup_d3:"D+3跟进话术", whatsapp_followup_d7:"D+7跟进话术", whatsapp_link:"wa.me一键链接", email_message_1:"邮件首触达草稿",
      linkedin_note_draft:"LinkedIn建联草稿", status:"状态", next_action:"下一步动作", next_followup_date:"下次跟进日期", notes:"备注",
      risk_flag:"风险标记", duplicate_flag:"重复标记", last_contact_date:"上次联系日期", reply_summary:"回复摘要"
    };
    const labelToField = Object.fromEntries(Object.entries(labels).map(([field, label]) => [label, field]));
    const statuses = ["novo", "qualificado", "contactar", "contactado", "respondeu", "enviar catálogo", "negociação", "fechado", "arquivado", "rejeitado"];
    let rows = JSON.parse(localStorage.getItem("krogRows") || "[]");
    let onlyAB = false;

    function parseCSV(text) {
      const out = [];
      let row = [], cell = "", quoted = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i + 1];
        if (c === '"' && quoted && n === '"') { cell += '"'; i++; continue; }
        if (c === '"') { quoted = !quoted; continue; }
        if (c === "," && !quoted) { row.push(cell); cell = ""; continue; }
        if ((c === "\n" || c === "\r") && !quoted) {
          if (c === "\r" && n === "\n") i++;
          row.push(cell); cell = "";
          if (row.some(v => v.trim())) out.push(row);
          row = [];
          continue;
        }
        cell += c;
      }
      row.push(cell);
      if (row.some(v => v.trim())) out.push(row);
      const header = out.shift() || [];
      return out.map(r => {
        const row = {};
        header.forEach((h, i) => row[labelToField[h.trim()] || h.trim()] = r[i] || "");
        return row;
      });
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function toCSV(data) {
      return [fields.map(f => labels[f] || f).join(","), ...data.map(row => fields.map(f => csvEscape(row[f])).join(","))].join("\r\n");
    }

    function download(name, data) {
      const blob = new Blob(["\ufeff" + toCSV(data)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    function uniqueValues(key) {
      return [...new Set(rows.map(r => r[key]).filter(Boolean))].sort();
    }

    function fillFilters() {
      const source = document.getElementById("sourceFilter");
      const currentSource = source.value;
      source.innerHTML = '<option value="">全部来源</option>' + uniqueValues("source_platform").map(v => `<option>${v}</option>`).join("");
      source.value = currentSource;
      const status = document.getElementById("statusFilter");
      const currentStatus = status.value;
      status.innerHTML = '<option value="">全部状态</option>' + statuses.map(v => `<option>${v}</option>`).join("");
      status.value = currentStatus;
    }

    function filteredRows() {
      const source = document.getElementById("sourceFilter").value;
      const level = document.getElementById("levelFilter").value;
      const status = document.getElementById("statusFilter").value;
      return rows.filter(row =>
        (!source || row.source_platform === source) &&
        (!level || row.lead_level === level) &&
        (!status || row.status === status) &&
        (!onlyAB || ["A", "B"].includes(row.lead_level))
      );
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text || "");
    }

    function render() {
      fillFilters();
      const data = filteredRows();
      document.getElementById("totalCount").textContent = rows.length;
      document.getElementById("aCount").textContent = rows.filter(r => r.lead_level === "A").length;
      document.getElementById("bCount").textContent = rows.filter(r => r.lead_level === "B").length;
      document.getElementById("todayCount").textContent = rows.filter(r => ["A", "B"].includes(r.lead_level) && r.whatsapp_clean).length;
      document.getElementById("waCount").textContent = rows.filter(r => r.whatsapp_clean).length;

      document.getElementById("tbody").innerHTML = data.map((row, index) => `
        <tr>
          <td><span class="badge ${row.lead_level || 'D'}">${row.lead_level || "-"}</span></td>
          <td>${row.lead_score || ""}</td>
          <td><strong>${row.lead_name || row.store_name || ""}</strong><br><span class="muted">${row.store_name || ""}</span></td>
          <td>${row.source_platform || ""}<br><span class="muted">${row.source_detail || ""}</span></td>
          <td>${row.sales_platform || ""}</td>
          <td>${row.whatsapp_clean || row.whatsapp_raw || ""}</td>
          <td>${row.recommended_krog_category || ""}</td>
          <td>${row.business_signal || row.source_reason || ""}</td>
          <td class="message">${row.whatsapp_message_1 || ""}<br><button data-copy-message="${index}">复制话术</button></td>
          <td><button data-copy-link="${index}">复制链接</button><br><a href="${row.whatsapp_link || "#"}" target="_blank" rel="noreferrer">${row.whatsapp_link ? "打开" : ""}</a></td>
          <td>
            <select data-status="${index}">
              ${statuses.map(s => `<option ${row.status === s ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </td>
          <td><textarea data-notes="${index}">${row.notes || ""}</textarea></td>
        </tr>
      `).join("");

      document.querySelectorAll("[data-copy-message]").forEach(btn => {
        btn.addEventListener("click", () => copyText(data[Number(btn.dataset.copyMessage)].whatsapp_message_1));
      });
      document.querySelectorAll("[data-copy-link]").forEach(btn => {
        btn.addEventListener("click", () => copyText(data[Number(btn.dataset.copyLink)].whatsapp_link));
      });
      document.querySelectorAll("[data-status]").forEach(sel => {
        sel.addEventListener("change", () => {
          const row = data[Number(sel.dataset.status)];
          row.status = sel.value;
          localStorage.setItem("krogRows", JSON.stringify(rows));
        });
      });
      document.querySelectorAll("[data-notes]").forEach(input => {
        input.addEventListener("change", () => {
          const row = data[Number(input.dataset.notes)];
          row.notes = input.value;
          localStorage.setItem("krogRows", JSON.stringify(rows));
        });
      });
    }

    document.getElementById("csvFile").addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      rows = parseCSV(await file.text());
      localStorage.setItem("krogRows", JSON.stringify(rows));
      render();
    });
    ["sourceFilter", "levelFilter", "statusFilter"].forEach(id => document.getElementById(id).addEventListener("change", render));
    document.getElementById("showAB").addEventListener("click", () => { onlyAB = !onlyAB; render(); });
    document.getElementById("exportToday").addEventListener("click", () => download("today_contact_list.csv", rows.filter(r => ["A", "B"].includes(r.lead_level) && r.whatsapp_clean)));
    document.getElementById("exportAll").addEventListener("click", () => download("leads_export.csv", rows));
    render();
  </script>
</body>
</html>
